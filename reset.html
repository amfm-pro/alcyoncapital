<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f6feb" />
    <title>ALCYON CAPITAL - Reset mot de passe</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/png" href="assets/icon-192.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-page">
    <div class="page-shell">
      <header class="hero-brand">
        <img class="hero-icon" src="assets/icon-192.png" alt="Logo Alcyon Capital" />
        <h1 class="hero-title">ALCYON CAPITAL</h1>
      </header>

      <main class="container">
        <p id="status-message" class="status-message" aria-live="polite"></p>

        <section class="auth-grid">
          <form id="reset-form" class="auth-card" autocomplete="off" hidden>
            <h2>Nouveau mot de passe</h2>
            <label for="new-password">Nouveau mot de passe (12 caracteres min)</label>
            <input id="new-password" type="password" minlength="12" required />
            <label for="confirm-password">Confirmer le mot de passe</label>
            <input id="confirm-password" type="password" minlength="12" required />
            <button type="submit">Mettre a jour</button>
          </form>
          <p id="reset-back-link" hidden><a href="login.html">Retour a la connexion</a></p>
        </section>
      </main>
    </div>

    <script src="config.js"></script>
    <script src="supabase.js"></script>
    <script src="reset.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("sw.js")
            .catch((error) => console.error("Service Worker registration failed:", error));
        });
      }
    </script>
  </body>
</html>
